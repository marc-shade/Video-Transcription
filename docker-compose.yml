version: '3.8'

services:
  app:
    build: .
    container_name: video-transcription
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - transcription_db:/app/transcription.db
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - STREAMLIT_SERVER_PORT=8501
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Init container to pull the default model
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling mistral:instruct model..."
        ollama pull mistral:instruct
        echo "Model ready!"
    environment:
      - OLLAMA_HOST=ollama:11434
    restart: "no"

volumes:
  ollama_data:
    driver: local
  transcription_db:
    driver: local
